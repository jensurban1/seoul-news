name: 서울시 보도자료 매일 수집

on:
  schedule:
    - cron: '0 22 * * *'  # 매일 오전 7시 KST (UTC 22:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: 보도자료 수집
        run: python scripts/fetch.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git diff --staged --quiet || git commit -m "보도자료 업데이트: $(date +'%Y-%m-%d')"
          git push
