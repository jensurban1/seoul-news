name: 서울시보 매주 수집

on:
  schedule:
    # 매주 목요일 오전 9시 KST (UTC 목요일 00:00)
    - cron: '0 0 * * 4'
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: 서울시보 수집
        run: python scripts/fetch_sibo.py

       - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sibo.json
          git diff --staged --quiet || (git commit -m "서울시보 업데이트: $(date +'%Y-%m-%d')" && git pull --rebase && git push)
