name: 서울시보 매주 수집

on:
  schedule:
    - cron: '0 0 * * 4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: 서울시보 수집
        run: |
          python - << 'PYEOF'
          import requests, json, re
          from datetime import datetime, timezone, timedelta
          from html import unescape
          from pathlib import Path

          KST = timezone(timedelta(hours=9))
          OUT_PATH = Path("data/sibo.json")
          LIST_URL = "https://event.seoul.go.kr/seoulsibo/list.do"
          VIEW_URL = "https://event.seoul.go.kr/seoulsibo/view.do?id={id}"
          HEADERS = {
              "User-Agent": "Mozilla/5.0 (compatible; SeoulSiboBot/1.0)",
              "Referer": "https://event.seoul.go.kr/seoulsibo/list.do",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "ko-KR,ko;q=0.9",
          }
          ALL_GU = ["종로구","중구","용산구","성동구","광진구","동대문구","중랑구","성북구","강북구","도봉구","노원구","은평구","서대문구","마포구","양천구","강서구","구로구","금천구","영등포구","동작구","관악구","서초구","강남구","송파구","강동구"]
          ADMIN_KW = ["공시송달","과태료","압류","체납","공매","이행강제금","영업정지","과징금","대집행","청문","행정처분","직권말소","경고처분"]
          TOPIC_RULES = [
              ("renewal", ["정비구역","정비계획","재개발","재건축","뉴타운","모아타운","소규모재건축","소규모재개발","자율주택정비","도시환경정비","재정비촉진","관리처분","사업시행인가","추진위원회","조합설립인가","가로주택정비"]),
              ("law",     ["입법예고","조례 제정","조례 개정","조례 폐지","규칙 제정","규칙 개정","규칙 폐지"]),
              ("urban",   ["도시관리계획","도시기본계획","지구단위계획","용도지역","용도지구","용도구역","개발제한구역","도시개발","입지규제최소구역","특별계획구역","경관계획","도시재생","광역도시계획","개발행위"]),
              ("housing", ["공공주택","공동주택","분양권","임대주택","주거환경","주택공급","분양가","주택조합","민간임대"]),
              ("infra",   ["공원","도로","하천","광장","주차장","녹지","도시계획시설","상수도","하수도"]),
          ]
          TOPIC_LABEL = {"renewal":"정비사업","urban":"도시계획","housing":"주택","infra":"기반시설","law":"법규","misc":"기타"}
          IMPACT_LABEL = {"new":"신규 지정","major":"주요 변경","minor":"경미한 변경","release":"해제·실효","neutral":""}
          STATUS_LABEL = {"confirmed":"확정","planned":"예정"}

          def detect_impact(t):
              if re.search(r"해제|실효|일몰|폐지 결정", t): return "release"
              if re.search(r"경미한|경미 사항|지형도면|기간 연장|기간연장", t): return "minor"
              if not re.search(r"변경|경미|해제|실효", t):
                  if re.search(r"최초 지정|신규 지정|신설 결정|신규 승인|모아타운 선정", t): return "new"
                  if re.search(r"(구역|계획|지구|지역)\s*(지정|결정)\s*(고시)?", t): return "new"
              if re.search(r"변경", t) and not re.search(r"경미", t): return "major"
              return "neutral"

          def detect_status(t):
              if re.search(r"결정고시|결정·고시|지정고시|지정·고시|사업시행인가|확정", t): return "confirmed"
              if re.search(r"열람공고|주민공람|입법예고|\(안\)|계획안", t): return "planned"
              return "confirmed"

          def detect_topic(t):
              for topic, kws in TOPIC_RULES:
                  if any(kw in t for kw in kws): return topic
              return "misc"

          def is_relevant(t):
              return any(kw in t for kw in ["도시","계획","정비","주택","건축","토지","공원","도로","조례","규칙","구역","지구","용도","개발","수도","하천"])

          def make_summary(t, topic, impact, status, gu):
              loc = "·".join(gu) if gu else "해당 지역"
              desc = {"renewal":"정비사업(재개발·재건축)","urban":"도시관리계획","housing":"주택 관련 계획","infra":"기반시설 계획","law":"조례·규칙"}.get(topic,"관련 사항")
              if impact == "new": return f"{loc}에 {desc}이 신규로 지정·결정되었습니다."
              if impact == "major": return f"{loc}의 {desc}이 변경 결정되었습니다."
              if impact == "minor": return f"{loc}의 {desc} 경미한 사항이 변경되었습니다."
              if impact == "release": return f"{loc}의 {desc}이 해제·실효 처리되었습니다."
              if status == "planned": return f"{loc}의 {desc} (안)이 공람 중입니다."
              return f"{loc} {desc} 관련 사항이 고시되었습니다."

          def classify_item(title):
              title = title.strip()
              if len(title) < 6 or len(title) > 260: return None
              admin = any(kw in title for kw in ADMIN_KW)
              if not admin and not is_relevant(title): return None
              topic = detect_topic(title)
              status = "admin" if admin else detect_status(title)
              impact = "neutral" if admin else detect_impact(title)
              gu = [g for g in ALL_GU if g in title]
              return {"title":title,"topic":topic,"status":status,"impact":impact,"isAdmin":admin,"gu":gu,"summary":"" if admin else make_summary(title,topic,impact,status,gu),"topicLabel":TOPIC_LABEL.get(topic,topic),"impactLabel":IMPACT_LABEL.get(impact,""),"statusLabel":STATUS_LABEL.get(status,"")}

          def fetch_sibo_list(session):
              resp = session.get(LIST_URL, headers=HEADERS, timeout=20)
              resp.encoding = "utf-8"
              html = resp.text
              rows = re.findall(r"goView\('(\d+)'\)[^<]*</a>\s*</td>\s*<td[^>]*>\s*([\d.]+)", html)
              nos = re.findall(r"제(\d+)호", html)
              return [{"no": nos[i] if i < len(nos) else "", "date": date.strip(), "id": eid} for i, (eid, date) in enumerate(rows)]

          def fetch_sibo_contents(session, edition_id):
              try:
                  resp = session.get(VIEW_URL.format(id=edition_id), headers=HEADERS, timeout=20)
                  resp.encoding = "utf-8"
                  html = resp.text
              except Exception as e:
                  print(f"  오류: {e}"); return []
              titles = []
              for row in re.findall(r"<tr[^>]*>(.*?)</tr>", html, re.DOTALL):
                  for td in re.findall(r"<td[^>]*>(.*?)</td>", row, re.DOTALL):
                      text = re.sub(r"\s+", " ", unescape(re.sub(r"<[^>]+>", "", td))).strip()
                      if 8 < len(text) < 250 and not re.match(r"^\d+$", text):
                          titles.append(text)
              for t in re.findall(r'<a[^>]*>([^<]{8,200})</a>', html):
                  t = unescape(t).strip()
                  if t and t not in titles: titles.append(t)
              seen = set(); result = []
              for t in titles:
                  if t not in seen: seen.add(t); result.append(t)
              return result

          session = requests.Session()
          existing = {}
          if OUT_PATH.exists():
              with open(OUT_PATH, encoding="utf-8") as f:
                  for ed in json.load(f).get("editions", []): existing[ed["id"]] = ed
          print("목록 조회 중...")
          meta_list = fetch_sibo_list(session)
          print(f"  {len(meta_list)}개 확인")
          editions_out = []; new_count = 0
          for meta in meta_list:
              eid = meta["id"]
              if eid in existing:
                  editions_out.append(existing[eid]); print(f"  제{meta['no']}호 — 재사용"); continue
              print(f"  제{meta['no']}호 ({meta['date']}) — 수집 중...")
              titles = fetch_sibo_contents(session, eid)
              items = []; seen = set()
              for t in titles:
                  if t in seen: continue
                  seen.add(t)
                  item = classify_item(t)
                  if item: items.append(item)
              main_items = [i for i in items if not i["isAdmin"]]
              admin_items = [i for i in items if i["isAdmin"]]
              print(f"    주요 {len(main_items)}건 + 잡공고 {len(admin_items)}건")
              editions_out.append({"id":eid,"no":meta["no"],"date":meta["date"],"items":items,"mainCount":len(main_items),"adminCount":len(admin_items)})
              new_count += 1
          editions_out.sort(key=lambda x: x["date"].replace(".", "-"), reverse=True)
          editions_out = editions_out[:52]
          OUT_PATH.parent.mkdir(parents=True, exist_ok=True)
          with open(OUT_PATH, "w", encoding="utf-8") as f:
              json.dump({"updated_at":datetime.now(KST).strftime("%Y-%m-%d %H:%M"),"total_editions":len(editions_out),"new_today":new_count,"editions":editions_out}, f, ensure_ascii=False, indent=2)
          print(f"완료: {len(editions_out)}호, 신규 {new_count}호")
          PYEOF

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sibo.json
          git diff --staged --quiet || git commit -m "서울시보 업데이트: $(date +'%Y-%m-%d')"
          git push
