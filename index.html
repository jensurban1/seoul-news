<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울시 보도자료</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23003C8F'/><text x='16' y='23' font-family='Apple SD Gothic Neo,Noto Sans KR,sans-serif' font-size='18' font-weight='700' fill='white' text-anchor='middle'>서</text></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f5f5f3; --surface:#fff; --surface2:#f0f0ee;
  --border:#e4e4e0; --border2:#c8c8c4;
  --text:#111; --text2:#555; --text3:#999;
  --blue:#003C8F; --blue-bg:#E3EDFC; --blue-text:#003C8F;
  --red:#e63939; --radius:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#161616; --surface:#222; --surface2:#2a2a2a;
  --border:#333; --border2:#484848;
  --text:#eee; --text2:#aaa; --text3:#666;
  --blue:#5b9cf6; --blue-bg:#162545; --blue-text:#7eb3fa;
  --red:#ff6b6b;
}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.wrap{max-width:780px;margin:0 auto;padding:2rem 1rem 4rem;}
header{margin-bottom:1.5rem;}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:4px;}
.header-left{display:flex;align-items:center;gap:10px;}
.logo{width:38px;height:38px;border-radius:9px;background:#003C8F;color:white;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
h1{font-size:21px;font-weight:700;}
.count-pill{background:var(--surface2);border-radius:20px;font-size:12px;padding:3px 11px;color:var(--text2);}
.updated{font-size:12px;color:var(--text3);}
#search{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:9px;background:var(--surface);color:var(--text);font-size:14px;outline:none;margin-bottom:1.25rem;font-family:inherit;}
#search:focus{border-color:var(--blue);}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;}
.tab{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 16px;font-size:13px;cursor:pointer;color:var(--text2);font-family:inherit;transition:all 0.15s;}
.tab:hover{border-color:var(--border2);color:var(--text);}
