<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울시 보도자료</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f5f5f3; --surface:#fff; --surface2:#f0f0ee;
  --border:#e4e4e0; --border2:#c8c8c4;
  --text:#111; --text2:#555; --text3:#999;
  --blue:#003C8F; --blue-bg:#E3EDFC; --blue-text:#003C8F;
  --red:#e63939; --radius:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#161616; --surface:#222; --surface2:#2a2a2a;
  --border:#333; --border2:#484848;
  --text:#eee; --text2:#aaa; --text3:#666;
  --blue:#5b9cf6; --blue-bg:#162545; --blue-text:#7eb3fa; --red:#ff6b6b;
}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:2rem 1rem 4rem;}
header{margin-bottom:1.25rem;}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:4px;}
.header-left{display:flex;align-items:center;gap:10px;}
.logo{width:38px;height:38px;border-radius:9px;background:#003C8F;color:white;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
h1{font-size:21px;font-weight:700;}
.count-pill{background:var(--surface2);border-radius:20px;font-size:12px;padding:3px 11px;color:var(--text2);}
.updated{font-size:12px;color:var(--text3);}
#search{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:9px;background:var(--surface);color:var(--text);font-size:14px;outline:none;margin-bottom:1rem;font-family:inherit;}
#search:focus{border-color:var(--blue);}
/* 본부 탭 */
.group-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.gtab{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 15px;font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;font-weight:500;transition:all .15s;}
.gtab:hover{border-color:var(--border2);}
.gtab.on{background:#003C8F;border-color:#003C8F;color:white;}
/* 부서 서브 필터 */
.dept-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1rem;min-height:0;padding:6px 0;}
.dtag{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:3px 11px;font-size:11px;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s;}
.dtag:hover{border-color:var(--border2);}
.dtag.on{background:#1a4fa0;border-color:#1a4fa0;color:white;}
.divider{height:1px;background:var(--border);margin:0 0 1rem;}
/* 카드 */
.articles{display:flex;flex-direction:column;gap:7px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px;text-decoration:none;display:block;color:inherit;transition:border-color .15s,box-shadow .15s;}
.card:hover{border-color:var(--border2);box-shadow:0 2px 10px rgba(0,0,0,.07);}
.card-meta{display:flex;align-items:center;gap:7px;margin-bottom:6px;flex-wrap:wrap;}
.cat{font-size:11px;padding:2px 9px;border-radius:20px;background:var(--blue-bg);color:var(--blue-text);font-weight:600;}
.dbadge{font-size:11px;padding:2px 9px;border-radius:20px;background:var(--surface2);color:var(--text2);}
.date{font-size:12px;color:var(--text3);margin-left:auto;white-space:nowrap;}
.card-title{font-size:14px;line-height:1.65;}
.ndot{display:inline-block;width:6px;height:6px;background:var(--red);border-radius:50%;margin-left:6px;vertical-align:middle;}
.skeleton{height:74px;background:var(--surface2);border-radius:var(--radius);animation:pulse 1.4s ease-in-out infinite;margin-bottom:7px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.empty{text-align:center;padding:3rem 1rem;font-size:14px;color:var(--text3);}
.load-more{display:block;width:100%;margin-top:1rem;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--text2);cursor:pointer;text-align:center;font-family:inherit;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-top">
      <div class="header-left">
        <div class="logo">서울</div>
        <h1>서울시 보도자료</h1>
        <span class="count-pill" id="count-pill">로딩 중...</span>
      </div>
      <a href="https://www.seoul.go.kr/news/news_report.do" target="_blank" rel="noopener"
        style="font-size:12px;color:var(--text3);text-decoration:none;border:1px solid var(--border);padding:5px 12px;border-radius:8px;background:var(--surface)">서울시 원문 →</a>
    </div>
    <div class="updated" id="updated-at"></div>
  </header>

  <input type="search" id="search" placeholder="제목, 부서 검색..." oninput="applyF()">

  <!-- 본부/실 탭 -->
  <div class="group-tabs" id="group-tabs">
    <button class="gtab on" data-g="전체" onclick="setGroup(this)">전체</button>
    <button class="gtab" data-g="미래공간기획관" onclick="setGroup(this)">미래공간기획관</button>
    <button class="gtab" data-g="균형발전본부" onclick="setGroup(this)">균형발전본부</button>
    <button class="gtab" data-g="도시공간본부" onclick="setGroup(this)">도시공간본부</button>
    <button class="gtab" data-g="주택실" onclick="setGroup(this)">주택실</button>
  </div>

  <!-- 부서 서브 필터 (그룹 선택 시 표시) -->
  <div class="dept-bar" id="dept-bar"></div>
  <div class="divider"></div>

  <div id="main">
    <div class="skeleton"></div><div class="skeleton"></div>
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
  </div>
</div>
<script>
const PS = 30;
const SK = 'seen_' + new Date().toDateString();
let seen = new Set(JSON.parse(localStorage.getItem(SK) || '[]'));
let all = [], fil = [], pg = 1, curGroup = '전체', curDept = null;

// 본부/실별 부서 목록
const GROUPS = {
  '미래공간기획관': ['미래공간담당관','공공개발담당관','용산입체도시담당관','도시활력담당관'],
  '균형발전본부': ['균형발전정책과','도시정비과','동남권사업과','동북권사업과','서부권사업과','광화문광장사업과'],
  '도시공간본부': ['도시공간전략과','도시계획과','도시계획상임기획과','도시재창조과','신속통합기획과','도시관리과','시설계획과','토지관리과'],
  '주택실': ['주거정비과','재정비촉진과']
};
// 관심 부서 전체 목록 (빠른 검색용)
const ALL_DEPTS = Object.values(GROUPS).flat();

function catOf(t) {
  if (/교통|버스|지하철|도로|주차|철도|환승/.test(t)) return '교통';
  if (/주택|아파트|임대|전세|월세|부동산|청약/.test(t)) return '주택';
  if (/복지|돌봄|노인|어르신|장애|청년|아동|출산|저출생|육아|보육/.test(t)) return '복지';
  if (/문화|예술|공원|축제|행사|전시|박물관|도서관|공연/.test(t)) return '문화';
  if (/환경|공기|미세먼지|녹지|숲|기후|탄소|쓰레기/.test(t)) return '환경';
  if (/안전|소방|재난|방역|범죄|치안/.test(t)) return '안전';
  if (/경제|일자리|창업|취업|소상공인|산업|스타트업/.test(t)) return '경제';
  return '행정';
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* 본부/실 탭 전환 */
function setGroup(btn) {
  document.querySelectorAll('.gtab').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
  curGroup = btn.dataset.g;
  curDept = null;
  renderDeptBar();
  pg = 1; applyF();
}

/* 부서 서브 필터 렌더 */
function renderDeptBar() {
  const bar = document.getElementById('dept-bar');
  if (curGroup === '전체') { bar.innerHTML = ''; return; }
  const depts = GROUPS[curGroup] || [];
  bar.innerHTML = depts.map(function(d) {
    return '<button class="dtag' + (curDept === d ? ' on' : '') + '" onclick="setDept(this)" data-d="' + esc(d) + '">' + esc(d) + '</button>';
  }).join('');
}

/* 부서 서브 필터 선택 */
function setDept(btn) {
  const d = btn.dataset.d;
  curDept = curDept === d ? null : d;
  document.querySelectorAll('.dtag').forEach(function(b) { b.classList.remove('on'); });
  if (curDept) btn.classList.add('on');
  pg = 1; applyF();
}

/* 필터 적용 */
function applyF() {
  const q = (document.getElementById('search').value || '').trim().toLowerCase();
  // 관심 본부 소속 부서 목록 결정
  let targetDepts;
  if (curGroup === '전체') {
    targetDepts = ALL_DEPTS;
  } else if (curDept) {
    targetDepts = [curDept];
  } else {
    targetDepts = GROUPS[curGroup] || [];
  }

  fil = all.filter(function(i) {
    const dOk = targetDepts.indexOf(i.dept || '') !== -1;
    const sOk = !q || (i.title || '').toLowerCase().includes(q) || (i.dept || '').toLowerCase().includes(q);
    return dOk && sOk;
  });
  pg = 1; render();

  let label = fil.length + '건';
  if (curDept) label = curDept + ' · ' + label;
  else if (curGroup !== '전체') label = curGroup + ' · ' + label;
  document.getElementById('count-pill').textContent = label;
}

function render() {
  const sl = fil.slice(0, pg * PS);
  if (!sl.length) {
    document.getElementById('main').innerHTML = '<div class="empty">해당 부서의 보도자료가 없습니다.</div>';
    return;
  }
  let html = '<div class="articles">';
  for (let i = 0; i < sl.length; i++) {
    const it = sl[i];
    const isN = !seen.has(it.link);
    html += '<a class="card" href="' + esc(it.link || '#') + '" target="_blank" rel="noopener" onclick="markSeen(this.dataset.l)" data-l="' + esc(it.link || '') + '">';
    html += '<div class="card-meta">';
    html += '<span class="cat">' + esc(it.category || '') + '</span>';
    if (it.dept) html += '<span class="dbadge">' + esc(it.dept) + '</span>';
    html += '<span class="date">' + esc((it.date || '').substring(0, 10)) + '</span>';
    html += '</div>';
    html += '<div class="card-title">' + esc(it.title || '') + (isN ? '<span class="ndot"></span>' : '') + '</div>';
    html += '</a>';
  }
  html += '</div>';
  if (fil.length > sl.length) {
    html += '<button class="load-more" onclick="loadMore()">더 보기 (' + (fil.length - sl.length) + '건 남음)</button>';
  }
  document.getElementById('main').innerHTML = html;
}

function loadMore() { pg++; render(); }
function markSeen(l) { seen.add(l); localStorage.setItem(SK, JSON.stringify([...seen])); }

async function init() {
  try {
    const base = location.pathname.replace(/\/index\.html$/, '').replace(/\/$/, '');
    const res = await fetch(base + '/data/news.json?t=' + Date.now());
    if (!res.ok) throw new Error();
    const data = await res.json();
    all = (data.items || []).map(function(i) {
      return Object.assign({}, i, { category: i.category || catOf(i.title || '') });
    });
    if (data.updated_at) document.getElementById('updated-at').textContent = '마지막 업데이트: ' + data.updated_at;
    applyF();
  } catch(err) {
    document.getElementById('main').innerHTML = '<div class="empty">데이터를 불러오지 못했습니다.</div>';
    document.getElementById('count-pill').textContent = '오류';
  }
}
init();
</script>
</body>
</html>
